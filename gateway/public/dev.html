<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Portal Desenvolvedor — KYC API</title>
  <style>
    :root { --bg: #0f0f12; --card: #1a1a20; --text: #e4e4e7; --muted: #71717a; --accent: #22c55e; --border: #27272a; }
    * { box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 1.5rem; line-height: 1.5; }
    h1 { font-size: 1.5rem; margin-top: 0; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 1.25rem; margin-bottom: 1rem; }
    label { display: block; margin-bottom: 0.25rem; color: var(--muted); font-size: 0.875rem; }
    input, textarea, button { font: inherit; }
    input[type="password"], input[type="text"], textarea { width: 100%; padding: 0.5rem 0.75rem; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); margin-bottom: 0.75rem; }
    button { background: var(--accent); color: var(--bg); border: none; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; font-weight: 600; }
    button:hover { filter: brightness(1.1); }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    pre { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 1rem; overflow: auto; font-size: 0.8125rem; white-space: pre-wrap; word-break: break-all; }
    .ok { color: #22c55e; }
    .err { color: #ef4444; }
    .muted { color: var(--muted); font-size: 0.875rem; }
    a { color: #3b82f6; }
  </style>
</head>
<body>
  <h1>Portal Desenvolvedor — KYC API</h1>
  <p class="muted">Use sua API Key para ver seu uso e testar as rotas. Base URL: <span id="baseUrl"></span></p>

  <div class="card">
    <label for="apiKey">Sua API Key</label>
    <input type="password" id="apiKey" placeholder="bw_live_..." autocomplete="off" />
    <button type="button" id="btnMe">Ver meus dados e uso</button>
  </div>

  <div class="card" id="resultCard" style="display: none;">
    <h2 style="font-size: 1rem; margin-top: 0;">Resposta</h2>
    <pre id="result"></pre>
  </div>

  <div class="card">
    <h2 style="font-size: 1rem; margin-top: 0;">Testar chamada Score (CPF)</h2>
    <label for="cpf">CPF (apenas números)</label>
    <input type="text" id="cpf" placeholder="00000000000" maxlength="11" />
    <button type="button" id="btnScore">Chamar POST /v1/score-bw/score</button>
    <p class="muted">O contador de uso será incrementado após uma resposta 200.</p>
  </div>

  <script>
    (function () {
      const base = window.location.origin;
      document.getElementById("baseUrl").textContent = base;

      const apiKeyEl = document.getElementById("apiKey");
      const resultCard = document.getElementById("resultCard");
      const resultEl = document.getElementById("result");

      function showResult(obj, isError) {
        resultCard.style.display = "block";
        resultEl.textContent = JSON.stringify(obj, null, 2);
        resultEl.className = isError ? "err" : "ok";
      }

      async function request(path, options = {}) {
        const key = apiKeyEl.value.trim();
        if (!key) {
          showResult({ error: "Informe a API Key." }, true);
          return;
        }
        const res = await fetch(base + path, {
          ...options,
          headers: { "Content-Type": "application/json", "X-API-Key": key, ...(options.headers || {}) },
        });
        const text = await res.text();
        let data;
        try { data = JSON.parse(text); } catch { data = { raw: text }; }
        if (!res.ok) showResult(data, true);
        else showResult(data, false);
        return data;
      }

      document.getElementById("btnMe").onclick = () => request("/v1/me");
      document.getElementById("btnScore").onclick = () => {
        const cpf = (document.getElementById("cpf").value || "").replace(/\D/g, "");
        if (cpf.length !== 11) {
          showResult({ error: "CPF deve ter 11 dígitos." }, true);
          return;
        }
        request("/v1/score-bw/score", { method: "POST", body: JSON.stringify({ cpf }) });
      };
    })();
  </script>
</body>
</html>
